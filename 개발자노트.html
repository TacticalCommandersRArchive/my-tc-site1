<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>개발자노트</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 8%,rgba(0,170,255,.14),transparent 26rem),radial-gradient(circle at 88% 12%,rgba(30,191,255,.10),transparent 26rem),linear-gradient(135deg,rgba(255,255,255,.018) 25%,transparent 25%) 0 0/18px 18px,#070b12;color:#dff8ff;font-family:Bahnschrift,"Malgun Gothic",Arial,sans-serif;font-weight:700;padding:20px 0 46px}
.shell{width:min(980px,calc(100vw - 32px));margin:0 auto}
.home-banner{display:block;width:100%;max-width:1200px;margin:0 auto 28px;border-radius:10px;box-shadow:0 0 28px rgba(0,150,255,.28)}
.panel{border:1px solid rgba(139,232,255,.38);border-radius:8px;background:linear-gradient(180deg,rgba(9,17,26,.94),rgba(3,7,12,.98));box-shadow:0 14px 30px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.05);padding:18px 18px 20px}
.head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:14px;padding-bottom:13px;border-bottom:1px solid rgba(139,232,255,.22)}
h1{margin:0;color:#fff;font-size:24px;font-weight:900;line-height:1.25;text-shadow:0 1px 2px #000,0 0 10px rgba(0,165,220,.5)}
.sub{margin:5px 0 0;color:#8fb8c8;font-size:13px}
.home-link{color:#9fdfff;font-size:13px;text-decoration:none;text-shadow:0 1px 2px #000}
.home-link:hover{color:#fff}
.note-list{display:grid;gap:10px}
.note-card{display:grid;grid-template-columns:1fr auto;gap:8px 18px;align-items:center;padding:14px 16px;border:1px solid rgba(139,232,255,.24);border-radius:6px;background:rgba(5,12,18,.72);color:#e7fbff;text-decoration:none;transition:border-color .16s ease,background .16s ease,transform .16s ease}
.note-card:hover{border-color:rgba(139,232,255,.58);background:rgba(8,22,32,.86);transform:translateY(-1px)}
.note-title{color:#fff;font-size:17px;font-weight:900;text-shadow:0 1px 2px #000,0 0 8px rgba(0,165,220,.44)}
.note-date{color:#bfefff;font-size:14px;white-space:nowrap}
.note-author{grid-column:1/-1;color:#8fb8c8;font-size:13px}
@media(max-width:640px){.note-card{grid-template-columns:1fr}.note-date{white-space:normal}.head{align-items:start;flex-direction:column}}
</style>
</head>
<body>
<main class="shell">
  <a href="index.html" title="메인 화면으로 돌아가기">
    <img class="home-banner" src="images/channels_banner_title.jpg" alt="Tactical Commanders R Community Archive">
  </a>

  <section class="panel" aria-label="개발자노트 목록">
    <div class="head">
      <div>
        <h1>개발자노트</h1>
        <p class="sub">택티컬 커맨더스 R 개발 소식을 최신순으로 모아둔 페이지입니다.</p>
      </div>
      <a class="home-link" href="index.html">메인으로</a>
    </div>

    <div class="note-list">
      <a class="note-card" href="개발자노트_03.html">
        <span class="note-title">두번째 개발자 노트+@</span>
        <span class="note-date">2026.06.14 15:58</span>
        <span class="note-author">작성자: 택티컬 커맨더스 R</span>
      </a>
      <a class="note-card" href="개발자노트_02.html">
        <span class="note-title">두번째 개발자 노트</span>
        <span class="note-date">2026.06.12 19:22</span>
        <span class="note-author">작성자: 택티컬 커맨더스 R</span>
      </a>
      <a class="note-card" href="개발자노트_01.html">
        <span class="note-title">첫번째 개발자 노트</span>
        <span class="note-date">2026.05.26 23:35</span>
        <span class="note-author">작성자: 택티컬 커맨더스 R</span>
      </a>
    </div>
  </section>
</main>
</body>
</html>
