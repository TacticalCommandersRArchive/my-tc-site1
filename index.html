<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TC-Archive</title>
<style>
body{background:#070b12;color:#dff8ff;font-family:Bahnschrift,"Malgun Gothic",Arial,sans-serif;text-align:center;margin:0;padding-top:20px;}
.banner{width:100%;max-width:1200px;height:auto;display:block;margin:0 auto 34px auto;border-radius:10px;box-shadow:0 0 28px rgba(0,150,255,.28);}
.menu-buttons{display:flex;flex-direction:row;justify-content:flex-start;align-items:center;gap:26px;flex-wrap:wrap;max-width:1200px;margin:0 auto;padding-left:140px;}
.dropdown{position:relative;display:inline-block;}
.dropdown button{
  width:auto;
  height:auto;
  border:0;
  border-radius:0;
  background:transparent;
  color:#e7fbff;
  font-family:Bahnschrift,"Malgun Gothic",Arial,sans-serif;
  font-size:16px;
  font-weight:600;
  letter-spacing:.2px;
  text-shadow:0 1px 2px #000,0 0 7px rgba(0,165,220,.55);
  box-shadow:none;
  padding:0;
  cursor:pointer;
}
.dropdown button:hover,
.dropdown:focus-within button,
.dropdown:hover button{color:#fff;background:transparent;box-shadow:none;}
.dropdown button:active{transform:translateY(1px);}
.dropdown-menu{
  display:none;
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  padding:6px;
  border:1px solid rgba(30,191,255,.65);
  border-radius:8px;
  background:linear-gradient(180deg,#111c28 0%,#08111c 100%);
  box-shadow:0 12px 26px rgba(0,0,0,.6),0 0 18px rgba(0,170,255,.22);
  z-index:10;
}
.dropdown-menu.wide{width:260px;}
.dropdown.open .dropdown-menu{display:block;}
.dropdown-menu a{
  display:block;
  padding:10px 12px;
  border-radius:6px;
  color:#e7fbff;
  font-size:15px;
  font-weight:600;
  text-decoration:none;
  text-align:center;
  text-shadow:0 1px 2px #000;
}
.dropdown-menu a:hover,
.dropdown-menu a:focus{background:rgba(30,191,255,.16);color:#fff;outline:none;}
</style>
</head>
<body>
<img src="channels_banner_title.jpg" class="banner" alt="Tactical Commanders R Community Archive">
<div class="menu-buttons">
  <div class="dropdown">
    <button type="button">공식 ▾</button>
    <div class="dropdown-menu">
      <a href="https://www.youtube.com/@Tactical_Commanders_R">유튜브</a>
      <a href="https://discord.com/invite/DZURxHfDj">디스코드</a>
    </div>
  </div>
  <div class="dropdown">
    <button type="button">계산기 ▾</button>
    <div class="dropdown-menu">
      <a href="calculator.html">레벨 계산기</a>
      <a href="nationpower.html">국가력 계산기</a>
    </div>
  </div>
  <div class="dropdown">
    <button type="button">시뮬레이터 ▾</button>
    <div class="dropdown-menu wide">
      <a href="stat_simulator.html">스탯 시뮬레이터</a>
    </div>
  </div>
</div>
<script>
document.querySelectorAll(".dropdown button").forEach((button) => {
  button.addEventListener("click", (event) => {
    event.stopPropagation();
    const dropdown = button.closest(".dropdown");
    document.querySelectorAll(".dropdown.open").forEach((item) => {
      if (item !== dropdown) item.classList.remove("open");
    });
    dropdown.classList.toggle("open");
  });
});

document.addEventListener("click", () => {
  document.querySelectorAll(".dropdown.open").forEach((item) => {
    item.classList.remove("open");
  });
});
</script>
</body>
</html>
