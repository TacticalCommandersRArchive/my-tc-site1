<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>레벨 계산기-제작자 페디엘</title>
  <style>
    :root {
      color-scheme: dark;
      --content-width: 846px;
      --bg: #070b12;
      --panel: #080a0d;
      --panel-2: #10151a;
      --line: #5f747d;
      --line-soft: rgba(210, 230, 238, .18);
      --gold: #dff8ff;
      --text: #f4f8fa;
      --muted: #9daeb6;
      --danger: #ff8a7d;
      --ok: #8ee6b5;
      --field: #050608;
      --red-dark: #090d11;
      --red: #111b24;
      --red-hot: #dff8ff;
      --metal-dark: #0b0f13;
      --metal: #23313a;
      --metal-light: #7f98a4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0 auto;
      min-height: 100vh;
      font-family: "Agency FB", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(0, 170, 255, .14), transparent 26rem),
        radial-gradient(circle at 88% 12%, rgba(30, 191, 255, .10), transparent 26rem),
        linear-gradient(135deg, rgba(255, 255, 255, .018) 25%, transparent 25%) 0 0/18px 18px,
        var(--bg);
      color: var(--text);
    }

    .shell {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 14px 0 28px;
    }

    .home-banner {
      display: block;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto 16px;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .45);
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      padding: 18px 22px;
      border: 1px solid var(--line-soft);
      background: #080a0d;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .45);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
      color: var(--gold);
      text-transform: uppercase;
      text-shadow: none;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .badge {
      min-width: 170px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: #050608;
      text-align: center;
      color: var(--gold);
      font-weight: 800;
      font-size: 18px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      width: min(var(--content-width), 100%);
      margin: 10px auto;
      padding: 8px 10px;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .toolbar-tools {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tc-emblem {
      width: 34px;
      height: 34px;
      object-fit: contain;
      padding: 3px;
      border: 1px solid #24343d;
      border-radius: 6px;
      background: #000;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), 0 0 10px rgba(255,255,255,.08);
    }

    button {
      min-height: 32px;
      padding: 0 14px;
      border: 1px solid #5f747d;
      border-radius: 7px;
      background: linear-gradient(180deg, #171f26, #080b0f);
      color: #f4f8fa;
      font: inherit;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-shadow: none;
      box-shadow: 0 3px 8px rgba(0, 0, 0, .42);
    }

    .line-calc {
      min-height: 26px;
      padding: 0 10px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
    }

    button:hover {
      border-color: #dff8ff;
      color: #ffffff;
      background: linear-gradient(180deg, #24313a, #0c1116);
      box-shadow: 0 4px 10px rgba(0, 0, 0, .5);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: inset 0 2px 5px rgba(0,0,0,.65);
    }

    .total-box {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid #24343d;
      background: #050608;
      color: var(--muted);
      font-weight: 700;
      box-shadow: inset 0 0 0 1px #000;
    }

    .total-box strong {
      color: var(--gold);
      font-size: 20px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 0;
      background: transparent;
      padding: 5px;
      box-shadow: none;
    }

    table {
      width: auto;
      border-collapse: collapse;
      min-width: 0;
      margin: 0 auto;
      background: #050608;
    }

    th, td {
      border: 1px solid #24343d;
      padding: 4px 6px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background:
        linear-gradient(180deg, #18222a, #0b0f13);
      color: #f4f8fa;
      font-size: 12px;
      white-space: nowrap;
      border-top-color: #52656f;
      border-bottom-color: #000;
      text-shadow: none;
    }

    td {
      background:
        #07090c;
    }

    td.row-name {
      width: 42px;
      color: var(--gold);
      font-weight: 900;
      background: #050608;
    }

    th:nth-child(1),
    td:nth-child(1) {
      width: 58px;
      min-width: 58px;
    }

    th:nth-child(2),
    th:nth-child(3),
    th:nth-child(4),
    td:nth-child(2),
    td:nth-child(3),
    td:nth-child(4) {
      width: 76px;
    }

    th:nth-child(6),
    th:nth-child(7),
    td:nth-child(6),
    td:nth-child(7) {
      width: 94px;
    }

    th:nth-child(9),
    td:nth-child(9) {
      width: 132px;
    }

    th:nth-child(8),
    td:nth-child(8) {
      width: 82px;
    }

    input {
      width: 100%;
      min-width: 0;
      height: 26px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 2px 6px;
      text-align: center;
      font: inherit;
      font-family: Consolas, "Malgun Gothic", monospace;
      font-variant-numeric: tabular-nums;
      box-shadow: none;
    }

    .small-input {
      width: 48px;
    }

    .medium-input {
      width: 78px;
    }

    input:focus {
      outline: 2px solid rgba(223, 248, 255, .18);
      border-color: var(--gold);
      background: rgba(223, 248, 255, .04);
    }

    .readonly {
      font-family: Consolas, "Malgun Gothic", monospace;
      font-variant-numeric: tabular-nums;
      color: #f4f8fa;
      font-weight: 800;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
    }

    .over {
      color: var(--danger);
    }

    .ok {
      color: var(--ok);
    }

    .grid {
      width: min(var(--content-width), 100%);
      margin: 16px auto 0;
    }

    section {
      border: 0;
      background: transparent;
      padding: 8px;
      box-shadow: none;
    }

    h2 {
      margin: 0 0 8px;
      padding: 6px 10px;
      color: #f4f8fa;
      font-size: 15px;
      font-family: "Agency FB", "Malgun Gothic", system-ui, sans-serif;
      letter-spacing: 0;
      text-align: center;
      background: linear-gradient(180deg, #18222a, #0b0f13);
      border: 1px solid #24343d;
      text-shadow: none;
    }

    .exp-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px 8px;
      max-height: 300px;
      overflow: auto;
      padding-right: 4px;
    }

    .exp-item {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 6px;
      padding: 4px 7px;
      border-bottom: 1px solid #18222a;
      background: #07090c;
      font-variant-numeric: tabular-nums;
    }

    .exp-item b {
      color: var(--gold);
    }

    .formula {
      display: grid;
      gap: 10px;
      color: var(--muted);
      line-height: 1.55;
    }

    .formula code {
      color: #f4f8fa;
      background: #10151a;
      padding: 2px 6px;
    }

    @media (max-width: 920px) {
      .shell {
        width: min(100vw - 18px, 1480px);
        padding-top: 10px;
      }
      header {
        grid-template-columns: 1fr;
      }

      .badge {
        text-align: left;
      }

      .exp-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <a href="index.html" title="메인 화면으로 돌아가기">
      <img class="home-banner" src="images/channels_banner_title.jpg" alt="Tactical Commanders R Community Archive">
    </a>

    <div class="table-wrap">
      <table aria-label="렙제 계산기">
        <thead>
          <tr>
            
            <th>유닛수</th>
            <th>시작 레벨</th>
            <th>끝나는 레벨</th>
            <th>한마리 경험치</th>
            <th>총 경험치</th>
            <th>더하는 경험치</th>
            <th>빼는 경험치</th>
            <th>병과 레벨</th>
            <th>병과 업까지 남은 경험치</th>
            <th>줄 계산</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <div class="toolbar">
      <div class="toolbar-tools">
        <img class="tc-emblem" src="tc_key_anim.gif" alt="">
        <button type="button" id="calculateAll">모두 계산</button>
        <button type="button" id="clearAll">초기화</button>
      </div>
      <strong id="grandTotal" hidden>0</strong>
    </div>

    <div class="grid">
      <section>
        <h2>커맨더 필요 누적 경험치</h2>
        <div class="exp-grid" id="expTable"></div>
      </section>

    </div>
  </main>

  <script>
    const MAX_LEVEL = 112;
    const rowLetters = Array(11).fill("");
    const rowsEl = document.getElementById("rows");
    const expTableEl = document.getElementById("expTable");
    const grandTotalEl = document.getElementById("grandTotal");

    const neededExp = level => 6 * level * level;
    const format = value => Math.round(value || 0).toLocaleString("ko-KR");
    const clampLevel = value => {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return 0;
      return Math.max(0, Math.min(MAX_LEVEL, Math.floor(parsed)));
    };

    function unitExp(start, end) {
      const from = clampLevel(start);
      const to = clampLevel(end);
      if (to <= from) return 0;
      return triangular(to) - triangular(from - 1);
    }

    function triangular(level) {
      return level * (level + 1) / 2;
    }

    function gradeFromTotal(total) {
      const currentTotal = Math.max(0, total);

      if (currentTotal > neededExp(MAX_LEVEL)) {
        return { label: "112 초과", next: 0, over: true };
      }

      let grade = MAX_LEVEL;
      for (let level = 1; level <= MAX_LEVEL; level += 1) {
        if (currentTotal <= neededExp(level)) {
          grade = level;
          break;
        }
      }

      const nextNeed = Math.max(0, neededExp(grade) - currentTotal);
      return {
        label: grade > 0 ? String(grade) : "0",
        next: nextNeed,
        over: false,
        capped: grade >= MAX_LEVEL
      };
    }

    function numberFrom(row, name) {
      const input = row.querySelector(`[data-field="${name}"]`);
      const value = Number(String(input.value).replaceAll(",", ""));
      return Number.isFinite(value) ? value : 0;
    }

    function calculateRow(row) {
      const count = Math.max(0, Math.floor(numberFrom(row, "count")));
      const start = numberFrom(row, "start");
      const end = numberFrom(row, "end");
      const add = numberFrom(row, "add");
      const subtract = numberFrom(row, "subtract");
      const one = unitExp(start, end);
      const total = Math.max(0, one * count + add - subtract);
      const grade = gradeFromTotal(total);

      row.querySelector('[data-output="one"]').textContent = format(one);
      row.querySelector('[data-output="total"]').textContent = format(total);
      row.dataset.lineTotal = String(total);
      const gradeEl = row.querySelector('[data-output="grade"]');
      gradeEl.textContent = grade.label;
      gradeEl.className = `readonly ${grade.over ? "over" : grade.capped ? "ok" : ""}`;
      row.querySelector('[data-output="next"]').textContent = grade.capped || grade.over ? "-" : format(grade.next);
      row.dataset.total = String(total);
      return grade;
    }

    function applyGrade(row, cumulativeTotal) {
      const grade = gradeFromTotal(cumulativeTotal);
      const gradeEl = row.querySelector('[data-output="grade"]');
      gradeEl.textContent = grade.label;
      gradeEl.className = `readonly ${grade.over ? "over" : grade.capped ? "ok" : ""}`;
      row.querySelector('[data-output="next"]').textContent = grade.capped || grade.over ? "-" : format(grade.next);
      row.dataset.cumulative = String(cumulativeTotal);
    }

    function calculateAllRows() {
      document.querySelectorAll("tbody tr").forEach((row, index) => {
        if (!rowHasInput(row)) {
          clearRowOutputs(row);
          return;
        }
        row.dataset.calculated = "true";
        enforceMinimumStart(row, index);
        calculateRow(row);
      });
      updateCumulativeGrades();
    }

    function updateCumulativeGrades() {
      let grand = 0;
      document.querySelectorAll("tbody tr").forEach(row => {
        if (row.dataset.calculated !== "true") return;

        const lineTotal = Number(row.dataset.lineTotal || row.dataset.total || 0);
        grand += lineTotal;

        row.dataset.total = String(grand);
        row.querySelector('[data-output="total"]').textContent = format(grand);

        applyGrade(row, grand);
      });
      grandTotalEl.textContent = format(grand);
    }

    function rowHasInput(row) {
      return ["count", "start", "end", "add", "subtract"].some(name => {
        const input = row.querySelector(`[data-field="${name}"]`);
        return input && String(input.value).trim() !== "";
      });
    }

    function clearRowOutputs(row) {
      row.dataset.calculated = "false";
      row.dataset.total = "0";
      row.dataset.lineTotal = "0";
      row.dataset.cumulative = "0";
      row.querySelector('[data-output="one"]').textContent = "0";
      row.querySelector('[data-output="total"]').textContent = "0";
      const gradeEl = row.querySelector('[data-output="grade"]');
      gradeEl.textContent = "0";
      gradeEl.className = "readonly";
      row.querySelector('[data-output="next"]').textContent = "0";
    }

    function enforceMinimumStart(row, index) {
      if (index <= 0) return;
      const previousRow = rowsEl.querySelectorAll("tr")[index - 1];
      const previousGrade = Number(previousRow?.querySelector('[data-output="grade"]')?.textContent);
      if (!Number.isFinite(previousGrade) || previousGrade <= 0) return;

      const startInput = row.querySelector('[data-field="start"]');
      const currentStart = numberFrom(row, "start");
      if (currentStart < previousGrade) {
        startInput.value = String(previousGrade);
      }
    }

    function makeInput(field, value = "") {
      const compact = ["count", "start", "end"].includes(field) ? "small-input" : "medium-input";
      return `<input class="${compact}" inputmode="numeric" data-field="${field}" value="${value}" aria-label="${field}">`;
    }

    function buildRows() {
      rowsEl.innerHTML = rowLetters.map(letter => `
        <tr>
          <td>${makeInput("count", "1")}</td>
          <td>${makeInput("start")}</td>
          <td>${makeInput("end")}</td>
          <td class="readonly" data-output="one">0</td>
          <td class="readonly" data-output="total">0</td>
          <td>${makeInput("add")}</td>
          <td>${makeInput("subtract")}</td>
          <td class="readonly" data-output="grade">0</td>
          <td class="readonly" data-output="next">0</td>
          <td><button type="button" class="line-calc" data-line="${letter}">줄 계산</button></td>
        </tr>
      `).join("");
    }

    function buildExpTable() {
      expTableEl.innerHTML = Array.from({ length: MAX_LEVEL }, (_, index) => {
        const level = index + 1;
        return `<div class="exp-item"><b>${level}</b><span>${format(neededExp(level))}</span></div>`;
      }).join("");
    }

    function clearAll() {
      document.querySelectorAll("input").forEach(input => {
        input.value = "";
      });
      document.querySelectorAll("tbody tr").forEach(clearRowOutputs);
      grandTotalEl.textContent = "0";
    }

    buildRows();
    buildExpTable();
    document.querySelectorAll("tbody tr").forEach(clearRowOutputs);

    rowsEl.addEventListener("click", event => {
      if (!event.target.matches(".line-calc")) return;
      const row = event.target.closest("tr");
      const index = Array.from(rowsEl.querySelectorAll("tr")).indexOf(row);
      if (!rowHasInput(row)) {
        clearRowOutputs(row);
        updateCumulativeGrades();
        return;
      }
      row.dataset.calculated = "true";
      enforceMinimumStart(row, index);
      calculateRow(row);
      updateCumulativeGrades();
    });

    rowsEl.addEventListener("input", event => {
      const row = event.target.closest("tr");
      if (!row) return;
      row.dataset.calculated = "false";
      clearRowOutputs(row);
      updateCumulativeGrades();
    });
    document.getElementById("calculateAll").addEventListener("click", calculateAllRows);
    document.getElementById("clearAll").addEventListener("click", clearAll);
  </script>
</body>
</html>
